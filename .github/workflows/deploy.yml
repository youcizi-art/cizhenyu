name: Deploy to Cloudflare

run-name: Deploy #${{ inputs.deploy_id || 'unknown' }}

on:
  workflow_dispatch:
    inputs:
      deploy_id:
        description: 'Deployment record id'
        required: true
        type: string
      payload:
        description: 'Base64 encoded deployment payload'
        required: true
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --no-audit --no-fund

      - name: Execute Deployment Script
        run: npm run deploy
        env:
          DEPLOY_PAYLOAD: ${{ github.event.inputs.payload }}
