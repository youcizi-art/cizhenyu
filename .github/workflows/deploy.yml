name: Deploy to Cloudflare

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'Base64 encoded deployment payload'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Execute Deployment Script
        run: npm run deploy
        env:
          DEPLOY_PAYLOAD: ${{ github.event.inputs.payload }}
